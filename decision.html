<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Trade decision</title>
  <link rel="stylesheet" href="assets/styles.css"/>
  <script defer src="assets/app.js"></script>
</head>
<body onload="renderDecision();">
  <div class="app">
    <div class="status"><span>18:54</span><span>📶 33</span></div>
    
<a href="chart.html" class="back">‹</a>
<div class="card">
  <div class="section-title">AI Chart Analysis</div>
  <h2 id="decisionTicker">BTCUSD</h2>
  <div class="sub">Trade Decision</div>
  <div class="decision" style="margin-top:18px">
    <h3>Trade Decision</h3>
    <div class="signal"><span>↓</span><span id="signalText">Short Position (Sell)</span></div>
    <div id="conf" class="conf">Confidence Score: 85%</div>
    <div class="levelgrid">
      <div class="levelbox"><div class="lbl">Entry Price</div><div class="num blue" id="entry">5020.6</div></div>
      <div class="levelbox"><div class="lbl">Stop Loss</div><div class="num red" id="stop">5120.6</div></div>
      <div class="levelbox"><div class="lbl">Take Profit</div><div class="num green" id="tp">4870.6</div></div>
    </div>
    <div class="explain">
      <div style="font-size:18px;font-weight:800;margin-bottom:10px">Explanation</div>
      <div id="explanation"></div>
    </div>
  </div>
</div>
<div style="height:18px"></div>
<a class="btn" href="premium.html">Continue</a>

    <div class="footer-space"></div>
  </div>
</body>
</html>

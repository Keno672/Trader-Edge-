<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin</title><link rel='stylesheet' href='assets/styles.css'><script src='assets/app.js'></script></head><body onload="renderAdmin()"><div class='wrap'><script>document.write(nav('Admin'))</script>
<div class='panel'><div class='eyebrow'>Update Centre</div><h1>2 scans drive the session</h1><div class='field'><label>Session name</label><input id='sessionName'></div></div>
<div class='cards'>
  <div class='card'><div class='eyebrow'>Required</div><h3>Scan 1</h3><input type='file' onchange="setUpload('scan1',this)"><div id='scan1Name' class='note' style='margin-top:8px'></div></div>
  <div class='card'><div class='eyebrow'>Required</div><h3>Scan 2</h3><input type='file' onchange="setUpload('scan2',this)"><div id='scan2Name' class='note' style='margin-top:8px'></div></div>
  <div class='card'><div class='eyebrow'>Required</div><h3>Featured chart</h3><input type='file' onchange="setUpload('chart',this)"><div id='chartName' class='note' style='margin-top:8px'></div></div>
</div>
<div class='panel' style='margin-top:16px'><div class='eyebrow'>Macro news</div><input type='file' onchange="setUpload('news',this)"><div id='newsName' class='note' style='margin-top:8px'></div><div class='actions'><button class='btn primary' onclick='publishSession()'>Publish Session</button></div><div id='status' class='status'>Waiting for Scan 1 + Scan 2.</div></div>
</div></body></html>
